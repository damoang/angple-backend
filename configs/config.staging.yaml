# Staging Server Configuration
# APP_ENV=staging

server:
  port: 8081
  mode: production
  env: staging

database:
  host: ""  # DB_HOST 환경변수
  reader_host: ""  # 비우면 writer(host) 재사용 — read/write 분리 미사용 (no-op)
  port: 3306
  reader_port: 0   # 0이면 port 재사용
  user: ""  # DB_USER 환경변수
  password: ""  # DB_PASSWORD 환경변수
  dbname: angple_db
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 3600

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0
  pool_size: 100

jwt:
  secret: ""  # JWT_SECRET 환경변수
  expires_in: 900
  refresh_in: 604800

cors:
  allow_origins: "http://localhost:3000"

# 플러그인 설정
plugins:
  commerce:
    enabled: false
