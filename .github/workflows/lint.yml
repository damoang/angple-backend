name: Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write  # reviewdog가 PR에 코멘트를 달기 위해 필요
  checks: write         # Check run 생성을 위해 필요

jobs:
  lint:
    name: Lint (Push)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.11.2
        args: --timeout=5m

  golangci-lint:
    name: golangci-lint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0  # 전체 히스토리 필요 (base commit 비교용)

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    - name: Install golangci-lint
      run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.2

    - name: Run golangci-lint
      run: |
        set -o pipefail
        "$(go env GOPATH)/bin/golangci-lint" version
        time "$(go env GOPATH)/bin/golangci-lint" run --timeout=8m -v ./... 2>&1 | tee golangci-lint.log

    - name: Upload golangci-lint log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: golangci-lint-log
        path: golangci-lint.log
        if-no-files-found: warn

  golangci-reviewdog:
    name: golangci-lint reviewdog
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    - name: Install golangci-lint
      run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.2

    - name: Run golangci-lint for reviewdog
      run: |
        set -o pipefail
        "$(go env GOPATH)/bin/golangci-lint" run --timeout=8m --out-format=line-number ./... > golangci-reviewdog.log 2>&1 || true

    - name: Setup reviewdog
      uses: reviewdog/action-setup@v1

    - name: Report with reviewdog
      env:
        REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        reviewdog -f=golangci-lint -name="golangci-lint reviewdog" -reporter=github-pr-review -filter-mode=nofilter -fail-on-error=false < golangci-reviewdog.log

  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    - name: Check formatting
      run: |
        UNFORMATTED=$(find . -name '*.go' -not -path './plugins/*' -not -path './vendor/*' | xargs gofmt -s -l)
        if [ -n "$UNFORMATTED" ]; then
          echo "The following files are not formatted:"
          echo "$UNFORMATTED"
          echo "Please run 'gofmt -s -w .' to format your code"
          exit 1
        fi

    - name: Run go vet
      run: go vet $(go list ./... | grep -v /plugins/)
